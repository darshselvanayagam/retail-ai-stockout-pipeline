x-airflow-common: &airflow-common
  build: .
  environment:
    AIRFLOW__CORE__EXECUTOR: LocalExecutor
    AIRFLOW__DATABASE__SQL_ALCHEMY_CONN: postgresql+psycopg2://airflow:airflow@postgres/airflow
    AIRFLOW__CORE__LOAD_EXAMPLES: "false"
    AIRFLOW__WEBSERVER__SECRET_KEY: "my_shared_secret_key_123"
    AIRFLOW__WEBSERVER__BASE_URL: "http://localhost:8080"
    AIRFLOW__LOGGING__BASE_LOG_FOLDER: "/opt/airflow/logs"

    # Snowflake (pulled from your Mac shell exports)
    SF_ACCOUNT: ${SF_ACCOUNT}
    SF_USER: ${SF_USER}
    SF_PASSWORD: ${SF_PASSWORD}
    SF_WAREHOUSE: ${SF_WAREHOUSE}

    # Optional defaults you can keep for this project
    SF_ROLE: ${SF_ROLE:-}
    SF_DATABASE: ${SF_DATABASE:-RETAIL_AI}
    SF_SCHEMA: ${SF_SCHEMA:-BRONZE}

  volumes:
    - ./dags:/opt/airflow/dags
    - airflow_logs:/opt/airflow/logs

services:
  postgres:
    image: postgres:15
    container_name: airflow-postgres
    environment:
      POSTGRES_USER: airflow
      POSTGRES_PASSWORD: airflow
      POSTGRES_DB: airflow
    volumes:
      - airflow_pgdata:/var/lib/postgresql/data

  airflow-init:
    <<: *airflow-common
    container_name: airflow-init
    depends_on:
      - postgres
    entrypoint: /bin/bash
    command: >
      -c "
      airflow db migrate &&
      airflow users create
        --username admin
        --password admin
        --firstname Admin
        --lastname User
        --role Admin
        --email admin@example.com
      "

  webserver:
    <<: *airflow-common
    container_name: airflow-webserver
    hostname: airflow-webserver
    depends_on:
      - airflow-init
    ports:
      - "8080:8080"
    command: airflow webserver

  scheduler:
    <<: *airflow-common
    container_name: airflow-scheduler
    hostname: airflow-scheduler
    depends_on:
      - airflow-init
    command: airflow scheduler

volumes:
  airflow_pgdata:
  airflow_logs: