services:
  broker:
    image: apache/kafka:latest
    container_name: broker
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9091
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker:9091
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 3

  producer:
    build: ./producer
    container_name: producer
    depends_on:
      - broker
    environment:
      PYTHONUNBUFFERED: "1"
      KAFKA_BOOTSTRAP: broker:9092
      KAFKA_TOPIC: retail_events

  consumer:
    build: ./consumer
    container_name: consumer
    depends_on:
      - broker
    environment:
      KAFKA_BOOTSTRAP: broker:9092
      KAFKA_TOPIC: retail_events
      AWS_REGION: us-east-1
      S3_BUCKET: retail-ai-platform-darshini-001
      S3_PREFIX: retail/raw
    volumes:
      - ~/.aws:/root/.aws:ro